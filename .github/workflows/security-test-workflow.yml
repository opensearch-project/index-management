name: Security test workflow
# This workflow is triggered on pull requests to main
on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - "**"

jobs:
  Get-CI-Image-Tag:
    uses: opensearch-project/opensearch-build/.github/workflows/get-ci-image-tag.yml@2834790da070c2804c7234979c6e88feb9328355 # main
    with:
      product: opensearch

  security-test:
    needs: Get-CI-Image-Tag
    # This job runs on Linux
    runs-on: ubuntu-latest
    strategy:
      # This setting says that all jobs should finish, even if one fails
      fail-fast: false
      # This starts three jobs, setting these environment variables uniquely for the different jobs
      matrix:
        java: [ 21, 25 ]
    container:
      # using the same image which is used by opensearch-build team to build the OpenSearch Distribution
      # this image tag is subject to change as more dependencies and updates will arrive over time
      image: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-version-linux }}
      options: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-options }}

    steps:
      - name: Run start commands
        run: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-command }}
      # This step uses the setup-java Github action: https://github.com/actions/setup-java
      - name: Set Up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin # Temurin is a distribution of adoptium
          java-version: ${{ matrix.java }}
      # index-management
      - name: Checkout Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run integration tests
        run: | 
          chown -R 1000:1000 `pwd`
          su `id -un 1000` -c "./gradlew integTest -Dsecurity=true -Dhttps=true --tests '*IT'"
      - name: Upload failed logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: logs
          overwrite: 'true'
          path: build/testclusters/integTest-*/logs/*
